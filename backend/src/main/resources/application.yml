spring:
  application:
    name: expense-challenge
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/expense_challenge}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  http:
    clients:
      connect-timeout: 5s
      read-timeout: 10s

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

treasury:
  base-url: ${TREASURY_BASE_URL:https://api.fiscaldata.treasury.gov/services/api/fiscal_service}
  retry:
    max-retries: 3
    delay: 300
    multiplier: 2.0

resilience4j:
  circuitbreaker:
    instances:
      treasury:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
  timelimiter:
    instances:
      treasury:
        timeout-duration: 10s

fx-cache:
  ttl: P30D

outbox:
  relay:
    enabled: true
    fixed-delay: 2000
    batch-size: 50
    max-retries: 5

logging:
  level:
    root: INFO
    com.example.expensechallenge: INFO
    org.springframework.web: INFO
