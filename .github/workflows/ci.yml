name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — Gradle tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      # Caches Gradle wrapper, caches, and build-cache between runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

  # ── Web ───────────────────────────────────────────────────────────────────
  web:
    name: Web — format / lint / typecheck / test / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast on any high-severity vulnerability in the dependency tree.
      - name: Audit for high-severity vulnerabilities
        run: pnpm audit --audit-level=high

      - name: Check formatting
        run: pnpm format:check

      # Regenerate types from openapi.yaml and assert no uncommitted drift.
      - name: Generate OpenAPI types
        run: pnpm generate

      - name: Detect OpenAPI contract drift
        run: git diff --exit-code packages/api-contract/generated/

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      # Runs Vitest with v8 coverage; vitest.config.ts enforces 80/75/80 thresholds.
      - name: Test with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: packages/web/coverage/
          retention-days: 7

      # next build catches page-level errors that tsc alone may miss.
      - name: Build
        run: pnpm build

  # ── E2E ───────────────────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright (MSW)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install Chromium + its system-level dependencies on the runner.
      - name: Install Playwright browsers
        run: pnpm --filter @expense-challenge/web exec playwright install chromium --with-deps

      # NEXT_PUBLIC_API_MOCKING=enabled → MSW intercepts all /api/* calls;
      # playwright.config.ts starts the Next.js dev server automatically.
      - name: Run E2E tests
        run: pnpm --filter @expense-challenge/web test:e2e:mocked

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7
